<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Verificación de Certificado</title>

<style>
body{
    font-family: Arial;
    background-color: #f4f6f8;
    text-align: center;
}

.contenedor{
    background: white;
    width: 500px;
    margin: 50px auto;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
}

.valido{
    color: green;
    font-size: 24px;
    font-weight: bold;
}

.invalido{
    color: red;
    font-size: 24px;
    font-weight: bold;
}

.dato{
    margin: 10px 0;
    font-size: 18px;
}

button{
    margin-top: 20px;
    padding: 10px 20px;
    font-size: 16px;
    background-color: blue;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover{
    background-color: darkblue;
}
</style>

</head>

<body>

<div class="contenedor">

<h1>Verificación de Certificado</h1>

<p id="estado"></p>

<div id="info" style="display:none;">
    <p class="dato"><strong>Cliente:</strong> <span id="cliente"></span></p>
    <p class="dato"><strong>Equipo:</strong> <span id="equipo"></span></p>
    <p class="dato"><strong>Resultado:</strong> <span id="resultado"></span></p>

    <button id="verPdf">Ver Certificado PDF</button>
</div>

</div>

<script>

async function cargarCertificado(){

    const params = new URLSearchParams(window.location.search);
    const codigo = params.get("codigo");

    if(!codigo){
        document.getElementById("estado").innerHTML = "⚠️ Falta código";
        return;
    }

    const res = await fetch("/certificado?codigo=" + codigo);
    const data = await res.json();

    if(data.error){
        document.getElementById("estado").className = "invalido";
        document.getElementById("estado").innerHTML = "❌ Certificado NO válido";
        return;
    }

    // Mostrar válido
    document.getElementById("estado").className = "valido";
    document.getElementById("estado").innerHTML = "✅ Certificado válido";

    document.getElementById("info").style.display = "block";

    document.getElementById("cliente").innerText = data.cliente;
    document.getElementById("equipo").innerText = data.equipo;
    document.getElementById("resultado").innerText = data.resultado;

    document.getElementById("verPdf").onclick = () => {
        window.open("/" + data.pdf, "_blank");
    };
}

cargarCertificado();

</script>

</body>
</html>
