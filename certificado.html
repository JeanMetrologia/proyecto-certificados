<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<title>Verificador de Certificados</title>

<style>

body{
font-family:Arial;
text-align:center;
}

.cuadro{
border:2px solid black;
width:450px;
margin:auto;
padding:20px;
border-radius:10px;
}

input{
padding:8px;
width:250px;
}

button{
padding:10px 20px;
font-size:16px;
}

</style>

</head>

<body>

<img src="logo.jpg" width="529">

<h1 style="color:blue">Verifica tu certificado</h1>

<div class="cuadro">

<p>Ingrese el Nombre de la Empresa</p>

<input type="text" id="Empresa">

<p>Ingrese el número de certificado</p>

<input type="text" id="Codigo">

<br><br>

<button onclick="buscarCertificado()">Buscar</button>

</div>

<script>

// 🌐 URL de tu servidor en Render
const API_URL = "https://proyecto-certificados-k1s8.onrender.com";

// 🔎 BUSCAR MANUAL
async function buscarCertificado(){

let empresa = document.getElementById("Empresa").value.trim();
let codigo = document.getElementById("Codigo").value.trim();

if(!codigo){
alert("Ingrese el código");
return;
}

try {

let respuesta = await fetch(`${API_URL}/certificado?codigo=${codigo}`);
let data = await respuesta.json();

if(data.error){
alert("Certificado no encontrado");
return;
}

// validar empresa
if(empresa.toLowerCase() !== data.cliente.toLowerCase()){
alert("La empresa no coincide con el certificado");
return;
}

// 🔥 ABRIR PDF
window.location.href = `${API_URL}/${data.pdf}`;

} catch(error){
alert("Error al conectar con el servidor");
}

}


// 📱 AUTOMÁTICO SI VIENE DEL QR
window.onload = async function(){

const params = new URLSearchParams(window.location.search);
const codigo = params.get("codigo");

// SI VIENE DEL QR
if(codigo){

try {

let respuesta = await fetch(`${API_URL}/certificado?codigo=${codigo}`);
let data = await respuesta.json();

if(data.error){
document.body.innerHTML += "<h2>Certificado no válido</h2>";
return;
}

// 🔥 REDIRECCIÓN DIRECTA AL PDF
window.location.href = `${API_URL}/${data.pdf}`;

} catch(error){
document.body.innerHTML += "<h2>Error al conectar</h2>";
}

}

}

</script>

</body>

</html>
